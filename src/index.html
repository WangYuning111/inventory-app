<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Inventory Management System</title>
  <base href="/">
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Professional inventory management system for tracking stock levels, managing items, and monitoring inventory status in real-time.">
  <meta name="keywords" content="inventory management, stock tracking, warehouse management, item management, inventory system">
  <meta name="author" content="Yuning Wang">
  <meta name="robots" content="index, follow">
  
  <!-- Theme and Colors -->
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a2e">
  
  <!-- Viewport -->
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- Format Detection -->
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">
  
  <!-- PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inventory">
  
  <!-- Icons -->
  <link rel="icon" type="image/png" href="assets/icon/favicon.png">
  <link rel="apple-touch-icon" href="assets/icon/icon.png">
  
  <!-- Preconnect for Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <app-root>
    <!-- Splash Screen -->
    <div id="splash-screen">
      <div class="splash-content">
        <div class="splash-logo">
          <ion-icon name="cube"></ion-icon>
        </div>
        <div class="splash-app-name">Inventory</div>
        <div class="splash-loader">
          <div class="splash-spinner"></div>
        </div>
      </div>
    </div>
    <style>
      /* Splash Screen Styles */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      
      #splash-screen.hide {
        opacity: 0;
        visibility: hidden;
      }
      
      .splash-content {
        text-align: center;
        color: white;
      }
      
      .splash-logo {
        font-size: 80px;
        margin-bottom: 24px;
        animation: bounce 2s ease-in-out infinite;
      }
      
      .splash-app-name {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 2px;
        margin-bottom: 40px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      
      .splash-loader {
        display: flex;
        justify-content: center;
      }
      
      .splash-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @media (prefers-color-scheme: dark) {
        #splash-screen {
          background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
      }
    </style>
    <script>
      // Hide splash screen when app is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash-screen');
          if (splash) splash.classList.add('hide');
        }, 800);
      });
    </script>
  </app-root>
</body>
</html>
